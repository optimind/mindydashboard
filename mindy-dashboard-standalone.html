// ── Chip ───────────────────────────────────────────────────────────────
function Chip({ variant = 'info', children, dot = true }) {
  const v = {
    success: { background: '#E0F7F5', color: '#00756F' },
    warning: { background: '#FFF6E3', color: '#C98A2E' },
    danger:  { background: '#FFEEEB', color: '#C94E3F' },
    info:    { background: '#E8F0FB', color: '#0A2E6B' },
  }[variant];
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, height: 22, padding: '0 8px', borderRadius: 6, fontWeight: 700, fontSize: 11, fontFamily: 'Nunito', ...v }}>
      {dot && <span style={{ width: 6, height: 6, borderRadius: 999, background: 'currentColor' }}/>}
      {children}
    </span>
  );
}

// ── Avatar ─────────────────────────────────────────────────────────────
function Avatar({ src, name, size = 36, status }) {
  const initials = name ? name.split(' ').map(s => s[0]).join('').slice(0,2).toUpperCase() : '?';
  const statusColor = { online: '#00B5AE', idle: '#F5B44F', offline: '#A8B3C7' }[status];
  return (
    <div style={{ width: size, height: size, borderRadius: 999, flexShrink: 0, position: 'relative', background: '#6B8ED6', color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 800, fontSize: size * 0.38 }}>
      {src ? <img src={src} width={size} height={size} style={{ borderRadius: 999 }}/> : initials}
      {status && <span style={{ position: 'absolute', right: -1, bottom: -1, width: Math.max(10, size*0.3), height: Math.max(10, size*0.3), borderRadius: 999, border: '2px solid #fff', background: statusColor }}/>}
    </div>
  );
}

function MetricCard({ label, value, unit, delta, trend, icon, sparkColor='#00B5AE', sparkPoints, sparkArea }) {
  const up = trend === 'up';
  const dColor = trend === 'flat' ? '#7A89A8' : (up ? '#00756F' : '#C94E3F');
  const dBg    = trend === 'flat' ? '#F4F7FC' : (up ? '#E0F7F5' : '#FFEEEB');
  return (
    <div style={{ background: '#fff', borderRadius: 16, padding: 20, border: '1px solid #EEF3FB', boxShadow: '0 1px 2px rgba(10,46,107,0.04)', display: 'flex', flexDirection: 'column', gap: 12, minWidth: 0 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
        <div style={{ width: 36, height: 36, borderRadius: 10, background: sparkColor + '1A', color: sparkColor, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <Icon name={icon} size={18} stroke={2.2}/>
        </div>
        <div style={{ font: '700 12px/1 Nunito', color: '#4B5C82', flex: 1 }}>{label}</div>
        <Icon name="more" size={16} style={{ color: '#A8B3C7' }}/>
      </div>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 6 }}>
        <div style={{ font: '800 30px/1 Nunito', color: '#0A2E6B', letterSpacing: '-0.02em' }}>{value}</div>
        {unit && <div style={{ font: '700 13px/1 Nunito', color: '#7A89A8' }}>{unit}</div>}
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        {delta && (
          <div style={{ display: 'inline-flex', alignItems: 'center', gap: 4, padding: '3px 8px', borderRadius: 999, font: '700 11px/1 Nunito', color: dColor, background: dBg }}>
            {trend !== 'flat' && <svg width="10" height="10" viewBox="0 0 10 10" fill="none">{up ? <path d="M5 2L8.5 6L1.5 6Z" fill="currentColor"/> : <path d="M5 8L1.5 4L8.5 4Z" fill="currentColor"/>}</svg>}
            {delta}
          </div>
        )}
        <div style={{ font: '500 11px/1 Nunito', color: '#A8B3C7' }}>vs. last week</div>
      </div>
      {sparkPoints && (
        <svg width="100%" height="36" viewBox="0 0 200 36" preserveAspectRatio="none" style={{ marginTop: 'auto' }}>
          <defs><linearGradient id={`g-${label}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={sparkColor} stopOpacity="0.22"/><stop offset="100%" stopColor={sparkColor} stopOpacity="0"/></linearGradient></defs>
          <polyline fill={`url(#g-${label})`} stroke="none" points={sparkArea}/>
          <polyline fill="none" stroke={sparkColor} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" points={sparkPoints}/>
        </svg>
      )}
    </div>
  );
}

function Segmented({ options, value, onChange }) {
  return (
    <div style={{ display: 'inline-flex', padding: 3, background: '#F4F7FC', borderRadius: 8, border: '1px solid #E2EAF4' }}>
      {options.map(o => (
        <button key={o} onClick={() => onChange(o)} style={{ height: 28, padding: '0 12px', border: 0, borderRadius: 6, background: value===o ? '#fff' : 'transparent', color: value===o ? '#0A2E6B' : '#7A89A8', font: `${value===o?700:600} 12px/1 Nunito`, cursor: 'pointer', boxShadow: value===o ? '0 1px 2px rgba(10,46,107,0.06)' : 'none' }}>{o}</button>
      ))}
    </div>
  );
}

function InquiryChart() {
  const [active, setActive] = useState(SERIES.map(s => s.id));
  const [hoverIdx, setHoverIdx] = useState(null);
  const [gran, setGran] = useState('Daily');
  const [range, setRange] = useState('14d');
  const w=760, h=280, padL=40, padR=12, padT=18, padB=28;
  const innerW=w-padL-padR, innerH=h-padT-padB;
  const max = useMemo(() => {
    let m=0; CHART_DATA.forEach(d => active.forEach(k => { if(d[k]>m) m=d[k]; }));
    return Math.max(50, Math.ceil(m/10)*10);
  }, [active]);
  const xStep = innerW/(CHART_DATA.length-1);
  const yFor = v => padT+innerH-(v/max)*innerH;
  const xFor = i => padL+i*xStep;
  const toggle = id => setActive(a => a.includes(id) ? a.filter(x=>x!==id) : [...a,id]);
  const yTicks = [0, max*0.25, max*0.5, max*0.75, max];
  return (
    <section style={{ background:'#fff', borderRadius:16, border:'1px solid #EEF3FB', boxShadow:'0 1px 2px rgba(10,46,107,0.04)', overflow:'hidden' }}>
      <div style={{ padding:'20px 24px', display:'flex', alignItems:'flex-start', gap:16, borderBottom:'1px solid #F4F7FC', flexWrap:'wrap' }}>
        <div style={{ flex:1, minWidth:200 }}>
          <div style={{ font:'800 17px/1.2 Nunito', color:'#0A2E6B', letterSpacing:'-0.01em' }}>Inquiry types</div>
          <div style={{ font:'400 13px/1.4 Nunito', color:'#7A89A8', marginTop:4 }}>Conversations by category — Apr 23 → May 6</div>
        </div>
        <Segmented options={['Daily','Weekly','Monthly']} value={gran} onChange={setGran}/>
        <Segmented options={['7d','14d','30d','Custom']} value={range} onChange={setRange}/>
        <button style={{ height:34, padding:'0 12px', borderRadius:8, border:'1px solid #E2EAF4', background:'#fff', font:'700 12px/1 Nunito', color:'#0A2E6B', cursor:'pointer', display:'inline-flex', alignItems:'center', gap:6 }}>
          <Icon name="paperclip" size={14} stroke={2.2}/> Export
        </button>
      </div>
      <div style={{ padding:'14px 24px 0', display:'flex', flexWrap:'wrap', gap:8 }}>
        {SERIES.map(s => {
          const on = active.includes(s.id);
          return (
            <button key={s.id} onClick={()=>toggle(s.id)} style={{ display:'inline-flex', alignItems:'center', gap:8, padding:'6px 12px', borderRadius:999, border:`1px solid ${on?s.color+'55':'#E2EAF4'}`, background:on?s.color+'12':'#F4F7FC', color:on?'#0A2E6B':'#A8B3C7', font:'700 12px/1 Nunito', cursor:'pointer', transition:'all 150ms' }}>
              <span style={{ width:8, height:8, borderRadius:999, background:on?s.color:'#D9E4F5' }}/>
              {s.label}
              <span style={{ font:'500 11px/1 JetBrains Mono', color:on?'#7A89A8':'#C7CFDC' }}>{s.total}</span>
            </button>
          );
        })}
      </div>
      <div style={{ padding:'8px 24px 20px', position:'relative' }}>
        <svg width="100%" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{ display:'block', height:280 }}
          onMouseMove={e => {
            const rect=e.currentTarget.getBoundingClientRect();
            const px=(e.clientX-rect.left)/rect.width*w;
            const idx=Math.round((px-padL)/xStep);
            setHoverIdx(idx>=0&&idx<CHART_DATA.length?idx:null);
          }}
          onMouseLeave={()=>setHoverIdx(null)}
        >
          {yTicks.map((v,i) => (
            <g key={i}>
              <line x1={padL} x2={w-padR} y1={yFor(v)} y2={yFor(v)} stroke="#F4F7FC" strokeWidth="1" strokeDasharray={i===0?'0':'3 3'}/>
              <text x={padL-8} y={yFor(v)+4} textAnchor="end" style={{ font:'500 10px JetBrains Mono', fill:'#A8B3C7' }}>{Math.round(v)}</text>
            </g>
          ))}
          {SERIES.filter(s=>active.includes(s.id)).map(s => {
            const points=CHART_DATA.map((d,i)=>`${xFor(i)},${yFor(d[s.id])}`).join(' ');
            const area=`${xFor(0)},${yFor(0)} ${points} ${xFor(CHART_DATA.length-1)},${yFor(0)}`;
            return (
              <g key={s.id}>
                <defs><linearGradient id={`fill-${s.id}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={s.color} stopOpacity={s.id==='product'?0.18:0.06}/><stop offset="100%" stopColor={s.color} stopOpacity="0"/></linearGradient></defs>
                {s.id==='product' && <polygon fill={`url(#fill-${s.id})`} points={area}/>}
                <polyline fill="none" stroke={s.color} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" points={points}/>
              </g>
            );
          })}
          {CHART_DATA.map((d,i) => (
            (i%2===0||i===CHART_DATA.length-1) && <text key={i} x={xFor(i)} y={h-8} textAnchor="middle" style={{ font:'500 10px JetBrains Mono', fill:'#A8B3C7' }}>{d.d}</text>
          ))}
          {hoverIdx!==null && (
            <g>
              <line x1={xFor(hoverIdx)} x2={xFor(hoverIdx)} y1={padT} y2={h-padB} stroke="#0A2E6B" strokeWidth="1" strokeDasharray="3 3" opacity="0.3"/>
              {SERIES.filter(s=>active.includes(s.id)).map(s => <circle key={s.id} cx={xFor(hoverIdx)} cy={yFor(CHART_DATA[hoverIdx][s.id])} r="4" fill="#fff" stroke={s.color} strokeWidth="2"/>)}
            </g>
          )}
        </svg>
        {hoverIdx!==null && (
          <div style={{ position:'absolute', left:`min(calc(${(xFor(hoverIdx)/w)*100}% + 12px),calc(100% - 200px))`, top:16, background:'#fff', border:'1px solid #E2EAF4', borderRadius:12, padding:12, minWidth:180, boxShadow:'0 12px 32px rgba(10,46,107,0.12)', pointerEvents:'none' }}>
            <div style={{ font:'700 11px/1 JetBrains Mono', color:'#7A89A8', marginBottom:8 }}>{CHART_DATA[hoverIdx].d}</div>
            {SERIES.filter(s=>active.includes(s.id)).map(s => (
              <div key={s.id} style={{ display:'flex', alignItems:'center', gap:8, font:'600 12px/1.6 Nunito', color:'#0A2E6B' }}>
                <span style={{ width:8, height:8, borderRadius:2, background:s.color, flexShrink:0 }}/>
                <span style={{ flex:1, color:'#4B5C82' }}>{s.label}</span>
                <span style={{ font:'700 12px/1 Nunito', color:'#0A2E6B' }}>{CHART_DATA[hoverIdx][s.id]}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </section>
  );
}

}
